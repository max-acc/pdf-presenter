name: Deploy to GH pages.
description: Action to deploy react app in GH pages branch.
on:
  push:
    branches: ["main", "4_deployment-pipeline"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: 24
        
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        continue-on-error: false
      - name: Build artifact
        uses: actions/upload-pages-artifact@v3
        with:
            path: dist

  deploy: 
    needs: build
    runs-on: ubuntu-latest

    environment: 
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}

    steps:
      - name: Deploy to GH pages
        id: deployment
        uses: actions/deploy-pages@v4    
